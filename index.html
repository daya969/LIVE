<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العرض الأول المباشر</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>

    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #141414; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
        }
        
        .main-container { 
            display: flex; 
            max-width: 1300px; 
            margin: 0 auto; 
            gap: 20px; 
        }
        
        .video-section { 
            flex: 2; 
            background: #000; 
            border-radius: 8px; 
            overflow: hidden; 
        }
        
        .chat-section { 
            flex: 1; 
            background: #1f1f1f; 
            border-radius: 8px; 
            height: 480px; 
            overflow: hidden; 
            border: 1px solid #333; 
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
      
      .end-screen { 
            display: none; 
            text-align: center; 
            padding-top: 15%; 
            font-family: sans-serif; 
        }
        
        .end-screen h1 { 
            font-size: 50px; 
            color: #ff4757; 
            margin-bottom: 10px; 
        }
        
        .end-screen p { 
            font-size: 20px; 
            color: #aaa; 
        }
    </style>
</head>
<body>


<div class="main-container" id="live-interface">

    <div class="video-section">
        <video id="premiere-video" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto">
            <source id="video-source" type="application/x-mpegURL">
        </video>
    </div>

    <div class="chat-section">
        <iframe id="chat-iframe" src=""></iframe>
    </div>

</div>


<div class="end-screen" id="end-interface">
    <h1>🔴 انتهى العرض الأول</h1>
    <p>شكراً لكم على المشاهدة والتفاعل! انتظرونا في العرض القادم.</p>
</div>


<script>

    // ========================================================
    // ⚙️ لوحة التحكم - عدل الروابط والوقت هنا فقط:
    // ========================================================

    var CONFIG = {

        m3uUrl: "https://daya969.github.io/batatas-tv/batatas.m3u", 
        
        chatUrl: "https://livepush.io/chat/embed/YOUR_CHAT_ID", 
        
        videoDurationSeconds: 600, 
        
        liveProgressSeconds: 0 

    };

    // ========================================================
    // برمجيات النظام (لا تغير أي شيء بالأسفل لسلامة البث)
    // ========================================================


    // ربط الإعدادات تلقائياً بالصفحة
    document.getElementById('video-source').src = CONFIG.m3uUrl;
    document.getElementById('chat-iframe').src = CONFIG.chatUrl;
    
    var player = videojs('premiere-video');
    var realLiveTime = CONFIG.liveProgressSeconds;


    player.ready(function() {
        player.currentTime(realLiveTime);
        player.play();

        player.on('seeking', function() {
            if (player.currentTime() > realLiveTime) {
                player.currentTime(realLiveTime); // منع التقديم للأمام
            }
            // التأخير للخلف مسموح به عادي جداً
        });
    });


    var streamTimer = setInterval(() => {
        realLiveTime++;

        if (realLiveTime >= CONFIG.videoDurationSeconds) {
            clearInterval(streamTimer);
            player.pause();
            document.getElementById('live-interface').style.display = 'none';
            document.getElementById('end-interface').style.display = 'block';
        }
    }, 1000);

</script>

</body>
</html>
